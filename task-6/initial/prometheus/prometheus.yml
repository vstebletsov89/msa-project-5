global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
        labels:
          environment: local

  - job_name: "stock-etl-batch-live"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["stock-etl-app:8080"]
        labels:
          application: stock-etl-batch
          environment: local